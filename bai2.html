<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <button id="p"onclick="btnHienThi()" > Nhấn để mơ popup</button>
    <div class="popup-bg">
        <div class="popup">
            <div class="popup-header">
                header
                <button onclick="poupo()">&times;</button>
            </div>
            <div class="popup-body">
                đây là nội dung của popup
            </div>
        </div>
    </div>
    <script>
        for(let i=0;i<50;i++)
        document.write(`<h1>noi dung chinh ${i+1}</h1>`)
        const p = document.getElementById('p');
        function btnHienThi()
        {
            p.classList.add('p');
        }
    </script>
</body>
</html>
